# Databricks Asset Bundle (DAB) — despliegue declarativo a Databricks.
# Deploy:   databricks bundle deploy -t dev
# Run:      databricks bundle run olist_segmentation_pipeline -t dev
bundle:
  name: olist-customer-segmentation

variables:
  catalog:
    description: Unity Catalog destino
    default: main
  schema:
    description: Schema destino
    default: olist

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${workspace.host}
  prod:
    mode: production
    workspace:
      host: ${workspace.host}
    run_as:
      service_principal_name: ${var.service_principal}

resources:
  jobs:
    olist_segmentation_pipeline:
      name: "[${bundle.target}] Olist Customer Segmentation"
      tags:
        project: olist-ml
        owner: data-platform
      job_clusters:
        - job_cluster_key: seg_cluster
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_DS3_v2"
            autoscale:
              min_workers: 1
              max_workers: 4
            spark_conf:
              spark.sql.adaptive.enabled: "true"
              spark.databricks.delta.optimizeWrite.enabled: "true"
              spark.databricks.delta.autoCompact.enabled: "true"
      tasks:
        - task_key: build_features
          job_cluster_key: seg_cluster
          python_wheel_task:
            package_name: olist_seg
            entry_point: olist-seg
            parameters: ["--build-features"]
          libraries:
            - whl: ../dist/*.whl
        - task_key: build_train
          depends_on: [{ task_key: build_features }]
          job_cluster_key: seg_cluster
          python_wheel_task:
            package_name: olist_seg
            entry_point: olist-seg
            parameters: ["--build-train"]
          libraries:
            - whl: ../dist/*.whl
        - task_key: build_score
          depends_on: [{ task_key: build_train }]
          job_cluster_key: seg_cluster
          python_wheel_task:
            package_name: olist_seg
            entry_point: olist-seg
            parameters: ["--build-score"]
          libraries:
            - whl: ../dist/*.whl
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"   # diario 06:00 UTC
        timezone_id: "America/Bogota"
